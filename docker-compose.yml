services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.1 
    container_name: aspire-dashboard
    ports:
      - "18888:18888"
      - "4317:4317"
    environment:
      - ASPIRE_DASHBOARD_OTLP_PRIMARY_API_KEY=${ASPIRE_DASHBOARD_OTLP_PRIMARY_API_KEY}
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true 
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://0.0.0.0:4317
    networks:
      - app-network

  auth-api:
    build: 
      context: .
      dockerfile: SubscriptionManager/SubscriptionManager.Auth.API/Dockerfile
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${AUTH_DB_CONNECTION_STRING}
      - ConnectionStrings__AuthConnection=${AUTH_DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__BucketName=subscriptions
      - EmailSettings__SmtpServer=${SMTP_SERVER:-mailpit}
      - EmailSettings__SmtpPort=${SMTP_PORT:-1025}
      - EmailSettings__EnableSsl=${SMTP_ENABLE_SSL:-false}
      - EmailSettings__UseAuthentication=${SMTP_USE_AUTHENTICATION:-true}
      - EmailSettings__UserName=${SMTP_USERNAME:-testuser}
      - EmailSettings__Password=${SMTP_PASSWORD:-testpassword}
      - EmailSettings__SenderEmail=${SMTP_SENDER_EMAIL:-noreply@subscriptionmanager.com}
      - EmailSettings__SenderName=${SMTP_SENDER_NAME:-Subscription Manager}
      - EmailSettings__EnableSecondaryDelivery=${ENABLE_SECONDARY_EMAIL_DELIVERY:-false}
      - EmailSettings__SecondarySmtpServer=${YANDEX_SMTP_SERVER:-smtp.yandex.com}
      - EmailSettings__SecondarySmtpPort=${YANDEX_SMTP_PORT:-465}
      - EmailSettings__SecondaryEnableSsl=${YANDEX_SMTP_ENABLE_SSL:-true}
      - EmailSettings__SecondaryUseAuthentication=true
      - EmailSettings__SecondaryTimeoutMs=${YANDEX_SMTP_TIMEOUT_MS:-5000}
      - EmailSettings__SecondaryUserName=${YANDEX_SMTP_USERNAME:-}
      - EmailSettings__SecondaryPassword=${YANDEX_SMTP_PASSWORD:-}
      - EmailSettings__SecondarySenderEmail=${YANDEX_SENDER_EMAIL:-}
      - EmailSettings__SecondarySenderName=${YANDEX_SENDER_NAME:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:4317
      - OTEL_SERVICE_NAME=Auth.API
      - OTEL_EXPORTER_OTLP_HEADERS=x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARY_API_KEY}
    depends_on:
      sql-server:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  subscriptions-api:
    build:
      context: .
      dockerfile: SubscriptionManager/SubscriptionManager.Subscriptions.API/Dockerfile
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${SUBSCRIPTIONS_DB_CONNECTION_STRING}
      - ConnectionStrings__SubscriptionsConnection=${SUBSCRIPTIONS_DB_CONNECTION_STRING}
      - ConnectionStrings__AuthConnection=${AUTH_DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__BucketName=subscriptions
      - BePaid__ShopId=${BEPAID_SHOP_ID}
      - BePaid__SecretKey=${BEPAID_SECRET_KEY}
      - BePaid__ApiUrl=${BEPAID_API_URL:-https://checkout.bepaid.by/ctp/api/checkouts}
      - BePaid__ReturnUrl=${BEPAID_RETURN_URL:-http://127.0.0.1:3000/dashboard}
      - BEPAID_NOTIFICATION_URL=${BEPAID_NOTIFICATION_URL:-https://eddy-unhatched-synaptically.ngrok-free.dev/api/payments/webhook}
      - EmailSettings__SmtpServer=${SMTP_SERVER:-mailpit}
      - EmailSettings__SmtpPort=${SMTP_PORT:-1025}
      - EmailSettings__EnableSsl=${SMTP_ENABLE_SSL:-false}
      - EmailSettings__UseAuthentication=${SMTP_USE_AUTHENTICATION:-true}
      - EmailSettings__UserName=${SMTP_USERNAME:-testuser}
      - EmailSettings__Password=${SMTP_PASSWORD:-testpassword}
      - EmailSettings__SenderEmail=${SMTP_SENDER_EMAIL:-noreply@subscriptionmanager.com}
      - EmailSettings__SenderName=${SMTP_SENDER_NAME:-Subscription Manager}
      - EmailSettings__EnableSecondaryDelivery=${ENABLE_SECONDARY_EMAIL_DELIVERY:-false}
      - EmailSettings__SecondarySmtpServer=${YANDEX_SMTP_SERVER:-smtp.yandex.com}
      - EmailSettings__SecondarySmtpPort=${YANDEX_SMTP_PORT:-465}
      - EmailSettings__SecondaryEnableSsl=${YANDEX_SMTP_ENABLE_SSL:-true}
      - EmailSettings__SecondaryUseAuthentication=true
      - EmailSettings__SecondaryTimeoutMs=${YANDEX_SMTP_TIMEOUT_MS:-5000}
      - EmailSettings__SecondaryUserName=${YANDEX_SMTP_USERNAME:-}
      - EmailSettings__SecondaryPassword=${YANDEX_SMTP_PASSWORD:-}
      - EmailSettings__SecondarySenderEmail=${YANDEX_SENDER_EMAIL:-}
      - EmailSettings__SecondarySenderName=${YANDEX_SENDER_NAME:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:4317
      - OTEL_SERVICE_NAME=Subscriptions.API
      - OTEL_EXPORTER_OTLP_HEADERS=x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARY_API_KEY}
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        if [ -n "$${BEPAID_NOTIFICATION_URL}" ]; then
          export BePaid__NotificationUrl="$${BEPAID_NOTIFICATION_URL}"
          echo "Using webhook URL from BEPAID_NOTIFICATION_URL: $${BePaid__NotificationUrl}"
        else
          echo "BEPAID_NOTIFICATION_URL is empty; set it to your public API base (e.g. ngrok) + /api/payments/webhook"
          exit 1
        fi
        dotnet SubscriptionManager.Subscriptions.API.dll
    depends_on:
      sql-server:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./FrontReact
      dockerfile: Dockerfile 
    container_name: frontend
    ports:
      - "127.0.0.1:3000:80" 
    depends_on:
      - auth-api
      - subscriptions-api
    networks:
      - app-network

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
      
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_SMTP_AUTH: "${MAILPIT_SMTP_AUTH}"
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_ENABLE_CHAOS: "true"
      MP_CHAOS_TRIGGERS: "Sender:500:25"
    networks:
      - app-network

volumes:
  minio_data:
  sqlserver_data:

networks:
  app-network:
    driver: bridge